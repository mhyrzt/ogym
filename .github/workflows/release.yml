name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  validate:
    name: CI
    uses: ./.github/workflows/ci.yml

  version-check:
    name: Verify tag version
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v6
      - name: Compare tag and crate versions
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          crate_version="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "ogym") | .version')"
          if [ "$tag_version" != "$crate_version" ]; then
            echo "error: tag $GITHUB_REF_NAME does not match Cargo.toml version $crate_version"
            exit 1
          fi

  publish-crate:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: version-check
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish crate
        run: cargo publish --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  github-release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs: publish-crate
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          notes_file=".github/RELEASE_NOTE.md"
          if [ -s "$notes_file" ]; then
            gh release create "$GITHUB_REF_NAME" \
              --verify-tag \
              --title "OGym $GITHUB_REF_NAME" \
              --notes-file "$notes_file"
          else
            gh release create "$GITHUB_REF_NAME" \
              --verify-tag \
              --title "OGym $GITHUB_REF_NAME" \
              --generate-notes
          fi
